services:
  - type: web
    name: mockmate-api
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: "5000"
      - key: MONGO_URI
        sync: true
      - key: GEMINI_API_KEY
        sync: true
      - key: JWT_SECRET
        generateValue: true
